name: backup-and-deploy

on:
  push:
    branches: [preview]

jobs:
  backup-d1:
    name: Backup D1 before deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Export D1 database
        run: npx wrangler d1 export saasmail-db --remote --output=backup.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Upload backup to R2
        run: |
          TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)
          npx wrangler r2 object put saasmail-attachments/backups/d1-${TIMESTAMP}.sql --file=backup.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Clean up old backups (keep last 10)
        run: |
          # List all backups, sort by date, delete oldest beyond 10
          npx wrangler r2 object list saasmail-attachments --prefix backups/d1- \
            | jq -r '.[] | .key' \
            | sort \
            | head -n -10 \
            | xargs -I{} npx wrangler r2 object delete saasmail-attachments {}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
