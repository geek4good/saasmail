name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  vitest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --frozen-lockfile
      - name: Seed wrangler.jsonc (gitignored; needed by vitest-pool-workers)
        run: cp wrangler.jsonc.ci wrangler.jsonc
      - name: Create empty assets dir (referenced by wrangler.jsonc)
        run: mkdir -p dist/client
      - name: Type check
        run: yarn tsc --noEmit
      - run: yarn test
