name: e2e

on:
  push:
    branches: [main]
  pull_request:

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn

      - name: Install deps
        run: yarn install --frozen-lockfile

      - name: Seed wrangler.jsonc (gitignored; needed by vite dev)
        run: cp wrangler.jsonc.ci wrangler.jsonc

      - name: Create empty assets dir (referenced by wrangler.jsonc)
        run: mkdir -p dist/client

      - name: Write .dev.vars for demo-mode dev server
        run: |
          cat > .dev.vars <<EOF
          DEMO_MODE=1
          DISABLE_PASSKEY_GATE=true
          BETTER_AUTH_SECRET=ci-only-secret-not-used-for-real-auth
          EOF

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Chromium
        run: yarn playwright install --with-deps chromium

      - name: Run E2E suite
        run: yarn test:e2e
        env:
          CI: "true"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
